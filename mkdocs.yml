# mkdocs.yml

# The name of your site (appears in the header and browser tab)
site_name: CoursePuppeteer

# Optional: a short description for search engines
site_description: An open-source framework for simple, automated content delivery for university courses.  

theme:
  name: material
  logo: 'icons/White_RGB.png'

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

  features:
    # - navigation.sections
    # - navigation.expand
    # - navigation.instant
    # - toc.integrate
    # - content.code.copy
    # - content.code.annotate
    # - content.action.edit
    # - content.action.view
    # - content.tabs.link
    # - search.suggest
    # - search.highlight

    - navigation.instant
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - search.suggest
    - search.highlight

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css

# site_url: https://dtuimageanalysisorg.github.io/DTUImageAnalysis/

# Markdown extensions for nicer formatting
markdown_extensions:
  - toc:
      permalink: true          # Adds a § link to each heading for easy linking
      toc_depth: 2
  # - codehilite                  # Syntax highlighting for code blocks
  - admonition                  # For notes/warnings/caution boxes
  - footnotes                   # Optional, if you want footnotes
  - tables      
  - pymdownx.details                # Supports Markdown tables
  - pymdownx.tabbed:      #windows / mac users dual box support 
      alternate_style: true  # Recommended for the modern Material look

  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets

  - attr_list
  - md_in_html
  - pymdownx.striphtml
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true

  - pymdownx.arithmatex:
      generic: true
  

plugins:
  - search
  - glightbox

  # Extra options
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/martinaegidius/CoursePuppeteer


      # URL navigation
nav:
