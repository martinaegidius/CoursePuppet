# mkdocs.yml

# The name of your site (appears in the header and browser tab)
site_name: 02502/02503 DTU Image Analysis Exercises

# Optional: a short description for search engines
site_description: 02502/02503 DTU Image Analysis Course 

theme:
  name: material
  logo: 'icons/White_RGB.png'

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

  features:
    # - navigation.sections
    # - navigation.expand
    # - navigation.instant
    # - toc.integrate
    # - content.code.copy
    # - content.code.annotate
    # - content.action.edit
    # - content.action.view
    # - content.tabs.link
    # - search.suggest
    # - search.highlight

    - navigation.instant
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - search.suggest
    - search.highlight

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/katex@0/dist/katex.min.css

# site_url: https://dtuimageanalysisorg.github.io/DTUImageAnalysis/

# Markdown extensions for nicer formatting
markdown_extensions:
  - toc:
      permalink: true          # Adds a § link to each heading for easy linking
      toc_depth: 2
  # - codehilite                  # Syntax highlighting for code blocks
  - admonition                  # For notes/warnings/caution boxes
  - footnotes                   # Optional, if you want footnotes
  - tables      
  - pymdownx.details                # Supports Markdown tables

  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets

  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - glightbox

  # Extra options
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DTUImageAnalysisOrg/DTUImageAnalysis


      # URL navigation
nav:
  - Overview:
    - README.md
  - Installation and Setup Guide:
    - ex1-setup/ex1-setup.md
    - Figures in Notebooks: ex1-setup/figs_in_nbs.md
  - 1) Introduction to Image Analysis:
    - ex1-IntroductionToImageAnalysis/README.md
    - Exercises: ex1-IntroductionToImageAnalysis/ex1-intro.md
  - 1b) Principal Component Analysis (PCA) in Python: 
    - ex1b-PCA/README.md
    - Exercises: ex1b-PCA/ex1b-pca.md
  - 2) Cameras and Lenses:
    - ex2-CamerasAndLenses/README.md
    - Exercises: ex2-CamerasAndLenses/ex2-cam.md
  - 2b) Change Detection in Videos:
    - ex2b-ChangeDetectionInVideos/README.md
    - Exercises: ex2b-ChangeDetectionInVideos/ex2b-change_detection.md
  - 3) Pixelwise Operations:
    - ex3-PixelwiseOperations/README.md
    - Exercises: ex3-PixelwiseOperations/ex3-pw_ops.md
  - 4) Image Filtering:
    - ex4-ImageFiltering/README.md
    - Exercises: ex4-ImageFiltering/ex4-filter.md
  - 4b) Image Morphology:
    - ex4b-ImageMorphology/README.md
    - Exercises: ex4b-ImageMorphology/ex4b-morph.md
  - 5) BLOB Analysis (connected component analysis and object classification):
    - ex5-BLOBAnalysis/README.md
    - Exercises: ex5-BLOBAnalysis/ex5-blob.md
  - 6) Pixel Classification and Object Segmentation:
    - ex6-PixelClassificationAndObjectSegmentation/README.md
    - Exercises: ex6-PixelClassificationAndObjectSegmentation/ex6-pixel_cls.md
  - 6b) Advanced Segmentation (Fisherman's LDA for Segmentation):
    - ex6b-AdvancedPixelClassification/README.md
    - Exercises: ex6b-AdvancedPixelClassification/ex6b-advanced_pixel_cls.md
  - 7) Geometric Transformations and Landmark Based Registration:
    - ex7-GeometricTransformationsAndRegistration/README.md
    - Exercises: ex7-GeometricTransformationsAndRegistration/ex7-registration.md
  - 8) Cats, Cats, and EigenCats!:
    - ex8-CatsCatsCats/README.md
    - Exercises: ex8-CatsCatsCats/ex8-cats.md
  - 9) Advanced 3D Registration:
    - ex9-AdvancedRegistration/README.md
    - Exercises: ex9-AdvancedRegistration/ex9-advanced_registration.md
